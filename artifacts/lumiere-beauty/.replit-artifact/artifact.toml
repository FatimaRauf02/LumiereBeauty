kind = "web"
previewPath = "/"
title = "Lumière Beauty"
version = "1.0.0"
id = "artifacts/lumiere-beauty"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24667

[services.development]
run = "pnpm --filter @workspace/lumiere-beauty run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumiere-beauty", "run", "build" ]
publicDir = "artifacts/lumiere-beauty/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24667"
BASE_PATH = "/"
